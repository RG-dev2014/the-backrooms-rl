<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="512" height="512">
  <rect width="200" height="200" fill="#F8EEA5" />
  
  <g fill="none" stroke="#E3D482" stroke-width="12" stroke-linejoin="miter" stroke-linecap="square">
    <!-- Col 1 (Center X=50) -->
    <polyline points="20,50 50,20 80,50" />
    <polyline points="20,75 50,45 80,75" />
    
    <polyline points="20,150 50,120 80,150" />
    <polyline points="20,175 50,145 80,175" />

    <!-- Col 2 (Center X=150) -->
    <!-- Top partial group -->
    <polyline points="120,0 150,-30 180,0" />
    <polyline points="120,25 150,-5 180,25" />

    <!-- Middle group -->
    <polyline points="120,100 150,70 180,100" />
    <polyline points="120,125 150,95 180,125" />

    <!-- Bottom partial group -->
    <polyline points="120,200 150,170 180,200" />
    <polyline points="120,225 150,195 180,225" />

    <!-- Vertical Stripes -->
    <line x1="0" y1="0" x2="0" y2="200" stroke-width="4" />
    <line x1="100" y1="0" x2="100" y2="200" stroke-width="4" />
    <line x1="200" y1="0" x2="200" y2="200" stroke-width="4" />
    
    <line x1="12" y1="0" x2="12" y2="200" stroke-width="2" />
    <line x1="88" y1="0" x2="88" y2="200" stroke-width="2" />
    <line x1="112" y1="0" x2="112" y2="200" stroke-width="2" />
    <line x1="188" y1="0" x2="188" y2="200" stroke-width="2" />
  </g>
</svg>
